<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <radialGradient id="headerSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#F6821F"/>
      <stop offset="100%" style="stop-color:#E8541F"/>
    </radialGradient>
    <filter id="headerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="36" height="36" rx="6" fill="url(#headerBg)"/>
  <path d="M0,36 L6,24 L12,28 L18,18 L24,26 L30,20 L36,28 L36,36 Z" fill="#3d2a5c"/>
  <circle cx="18" cy="16" r="5" fill="url(#headerSun)" filter="url(#headerGlow)"/>
  <circle cx="8" cy="10" r="1" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="8" r="1" fill="#fff" opacity="0.5">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>

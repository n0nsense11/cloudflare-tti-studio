<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    
    <!-- Sun gradient -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#F6821F"/>
      <stop offset="100%" style="stop-color:#E8541F"/>
    </radialGradient>
    
    <!-- Sun glow -->
    <filter id="sunGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="url(#bgGrad)"/>
  
  <!-- Mountain range - darker with purple tint -->
  <path d="M0,200 L40,120 L80,160 L120,80 L160,140 L200,70 L240,130 L280,90 L300,110 L300,200 Z" 
        fill="#2d1f4e"/>
  
  <!-- Front mountain range - lighter purple -->
  <path d="M0,200 L30,150 L70,170 L110,110 L150,150 L190,100 L230,140 L270,105 L300,130 L300,200 Z" 
        fill="#3d2a5c"/>
  
  <!-- Sun with glow -->
  <g filter="url(#sunGlow)">
    <circle cx="150" cy="85" r="25" fill="url(#sunGrad)"/>
  </g>
  
  <!-- Sun rays -->
  <g stroke="#F6821F" stroke-width="2" opacity="0.4">
    <line x1="150" y1="45" x2="150" y2="35">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="185" y1="60" x2="192" y2="52">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="195" y1="85" x2="205" y2="85">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="185" y1="110" x2="192" y2="118">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </line>
    <line x1="115" y1="60" x2="108" y2="52">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.15s"/>
    </line>
    <line x1="105" y1="85" x2="95" y2="85">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.45s"/>
    </line>
    <line x1="115" y1="110" x2="108" y2="118">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.75s"/>
    </line>
  </g>
  
  <!-- Sparkles -->
  <g fill="#ffffff">
    <!-- Top left sparkles -->
    <circle cx="50" cy="40" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="55" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="35" cy="70" r="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.8s" repeatCount="indefinite" begin="1s"/>
    </circle>
    
    <!-- Top right sparkles -->
    <circle cx="250" cy="35" r="2" opacity="0.7">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="270" cy="60" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.9s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="230" cy="50" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.3s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    
    <!-- Around sun sparkles -->
    <circle cx="100" cy="75" r="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="70" r="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0;0.5;0" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="125" cy="55" r="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="175" cy="50" r="1" opacity="0.4">
      <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>
